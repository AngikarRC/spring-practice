spring.application.name=practice

notification.type = sms
# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Datasource ? use in-memory OR file-based (pick one)

# Option 1: In-memory (resets on every restart)
spring.datasource.url=jdbc:h2:mem:practiceDB;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE

# Option 2: File-based (data persists across restarts) ? recommended for practice
# spring.datasource.url=jdbc:h2:file:C:/Users/Angikar/Documents/practiceDB/h2_db

spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=arc
spring.datasource.password=arctest

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
